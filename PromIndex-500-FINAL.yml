▌ Актуальность проблемы
Износ парка отечественных металлообрабатывающих станков достиг критического уровня, что создает риск возникновения значительных сбоев в работе промышленных предприятий. Согласно статистическим данным, средний возраст действующего парка металлорежущих станков превышает 25 лет, а доля зарубежных машин составляет около 70%. Это вызывает необходимость создания условий для организации серийного выпуска конкурентоспособных по качеству и стоимости аналогов зарубежным моделям. Одной из таких мер становится программа полной или частичной локализации производств типовых моделей станков, включая линии по изготовлению запасных частей и комплектующего оборудования.
▌ Цель исследования
Целью данного проекта стало изучение возможностей внедрения полномасштабной производственной программы локализации изготовления токарно-винторезных станков следующих модификаций:
- 1М63 – станок универсального назначения, предназначенный для выполнения широкого спектра работ;
- 16К40 – предназначен для обработки деталей диаметром до 800 мм и длиной до 2 м;
- 1М63Н – модернизированная версия базовой модели, оснащенная ЧПУ (числовым программным управлением);
- 16Р40 – автоматизированная модель станка, предназначенного для крупногабаритных заготовок.
Помимо самих станков предполагается наладить выпуск запасных частей и комплектующих, что позволит минимизировать сроки восстановления вышедших из строя агрегатов и повысить уровень эксплуатации уже имеющихся мощностей.
▌ Методы реализации программы
Программа предусматривает поэтапное внедрение производственного процесса на предприятии «». Основными этапами являются:
